<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        :root {
            --bg: #fafafa;
            --fg: #37352f;
            --accent: #7c3aed;
            --code-bg: #f6f8fa;
            --border: #e0e0e0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.6;
        }
        h1, h2, h3 { color: #1a1a1a; margin-top: 1.5em; }
        h1 { border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        code {
            background: var(--code-bg);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }
        pre {
            background: var(--code-bg);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
        }
        pre code { background: none; padding: 0; }
        blockquote {
            border-left: 4px solid var(--accent);
            margin: 1rem 0;
            padding-left: 1rem;
            color: #666;
        }
        .nav { margin-bottom: 2rem; }
        .nav a { margin-right: 1rem; }
        .tag {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.2em 0.6em;
            border-radius: 12px;
            font-size: 0.8em;
            margin-right: 0.5em;
        }
        .checklist { list-style: none; padding: 0; }
        .checklist li::before { content: "✓ "; color: var(--accent); }
        hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
        .back-link { display: inline-block; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/obsidian/">📚 笔记列表</a>
    </nav>
    <article>
        {{content}}
    </article>
    <hr>
    <footer>
        <p>Powered by Obsidian + Static Generator</p>
    </footer>
</body>
</html>
